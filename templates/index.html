<!DOCTYPE html>
<html>
<link rel="stylesheet" href="/static/styles.css">

<div class="container">

<h2>SQL Analyzer</h2>

<textarea id="query" rows="4"></textarea><br>

<button onclick="sendQuery()">Analyze</button>

<pre id="output"></pre>

</div>

<script>
function renderField(label, value) {
    if (!value) return "";
    return `• ${label}: ${value}\n`;
}
function renderResponse(data) {
    return `
================ SQL AI ANALYSIS ================

QUERY:
${data.query}

TYPE:
${data.case_type}

LATENCY:
${data.latency}s

--------------------------------------------------

ANALYSIS:

${renderField("Problem", data.analysis?.problem)}
${renderField("Root Cause", data.analysis?.root_cause)}
${renderField("Suggestion", data.analysis?.suggestion)}

${renderField("Performance Risk", data.analysis?.performance_risk)}
${renderField("Complexity", data.analysis?.complexity)}
${renderField("Bottleneck Type", data.analysis?.bottleneck_type)}
${renderField("Priority", data.analysis?.priority)}

${renderField("Index Recommendation", data.analysis?.index_recommendation)}
${renderField("Risk Summary", data.analysis?.risk_summary)}

${renderField("Confidence", data.analysis?.confidence)}
--------------------------------------------------
--------------------------------------------------

SQL INFO:
• Execution Plan: ${data.sql?.execution_plan || "-"}
• Anomaly: ${data.sql?.anomaly ? "Yes" : "No"}

--------------------------------------------------

RAG MATCH:
• Score: ${data.rag?.score || "-"}
• Similar Case:
${data.rag?.similar_case || "-"}

--------------------------------------------------

TOOL RESULT:
${JSON.stringify(data.tool, null, 2)}

==================================================
`;
}
function renderError(data) {
    return `
================ SQL ERROR ================

ERROR TYPE:
${data.type}

MESSAGE:
${data.error}

==========================================
`;
}
async function sendQuery() {
    const query = document.getElementById("query").value;
    document.getElementById("output").textContent = "Processing...";
    setTimeout(() => {
        document.getElementById("output").textContent += "Analyzing SQL query...\n";
    }, 500);

    setTimeout(() => {
        document.getElementById("output").textContent += "Checking execution plan...\n";
    }, 1500);

    setTimeout(() => {
        document.getElementById("output").textContent += "Looking for similar cases...\n";
    }, 3000);

    setTimeout(() => {
        document.getElementById("output").textContent += "This might take a while...\n";
    }, 3000);
    setTimeout(() => {
        document.getElementById("output").textContent += "Almost there...\n";
    }, 5000);
    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query})
    });

    const data = await res.json();
    if (data.type === "sql_error") {
        document.getElementById("output").textContent = renderError(data);
        return;
    }

    document.getElementById("output").textContent =
        renderResponse(data);
}
</script>

</body>
</html>
